<svg xmlns="http://www.w3.org/2000/svg" width="720" height="150" viewBox="0 0 720 150" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
<rect width="720" height="150" fill="white"/>
<text x="14" y="26" font-size="17" font-weight="700" fill="#1f2328">Conformance vectors: independent cross-validation</text>
<text x="14" y="44" font-size="11" fill="#8c959f">independent implementations that agree byte-for-byte on the same vectors. Sourced from the published corpus manifest.</text>
<text x="14" y="86" font-size="12" font-weight="700" fill="#1f2328">AlgoVoi JCS (RFC 8785) Substrate</text>
<rect x="320" y="74" width="300.0" height="18" rx="3" fill="#1a7f37"/>
<text x="628" y="88" font-size="11" fill="#1f2328">8 impls — 832/832 byte-for-byte, 21 sets / 166 vectors</text>
<text x="14" y="136" font-size="12" font-weight="400" fill="#1f2328">single-implementation vector set</text>
<rect x="320" y="124" width="37.5" height="18" rx="3" fill="#cf222e"/>
<text x="366" y="138" font-size="11" fill="#1f2328">1 impl — no independent cross-validation</text>
</svg>